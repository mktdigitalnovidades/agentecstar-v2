name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Obter o código fonte
      uses: actions/checkout@v4

    - name: ⚙️ Configurar Node.js (Vite)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Instalar dependências e Gerar Build (dist)
      run: |
        npm install
        npm run build
      
    - name: 📂 Sincronizar arquivos para a Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # Importante: se a sua conta de FTP apontar direto para a raiz do site, use "./"
        # Se apontar para a raiz da conta de hospedagem, use "public_html/" (conforme a Hostinger usa por padrão)
        server-dir: public_html/
        # A flag abaixo impede que o action delete arquivos que você tem lá que não deveriam (ex: .htaccess)
        dangerous-clean-slate: false
