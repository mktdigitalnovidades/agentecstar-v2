name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Obter o código fonte
      uses: actions/checkout@v4

    - name: ⚙️ Configurar Node.js (Vite)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Instalar dependências e Gerar Build (dist)
      run: |
        npm install
        npm run build
      
    - name: 📂 Sincronizar arquivos para a Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # public_html/ é o document root do agentecstar.com na Hostinger
        server-dir: public_html/
        dangerous-clean-slate: false
